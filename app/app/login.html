<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a56db">
  <title>Cobrika — Ingresa</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/app.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body style="padding-bottom:0">

<div class="app-login">
  <div class="app-login-card">
    <div class="app-login-logo">
      <div class="app-login-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75"/></svg>
      </div>
      <div class="app-login-title">Cobrika</div>
      <div class="app-login-sub">Ingresa a tu cuenta</div>
    </div>

    <div id="error-box" style="display:none;background:var(--cobrika-danger-bg);border:1px solid #fca5a5;border-radius:10px;padding:12px;font-size:.85rem;color:var(--cobrika-danger);margin-bottom:16px"></div>

    <form id="login-form" novalidate>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">Correo electrónico</label>
        <input class="form-control" type="email" id="email" placeholder="tu@email.com" autocomplete="email" style="font-size:16px">
      </div>
      <div class="form-group" style="margin-bottom:24px">
        <label class="form-label">Contraseña</label>
        <input class="form-control" type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="font-size:16px">
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full" id="btn-login">
        <span id="btn-text">Ingresar</span>
        <span id="btn-spinner" class="spinner" style="display:none"></span>
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:.82rem;color:var(--gray-400)">
      ¿Problemas para ingresar? Contacta a tu prestamista.
    </p>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { supabase } from '../shared/supabase-client.js';

// Si ya tiene sesión, redirigir
const { data: { session } } = await supabase.auth.getSession();
if (session?.user?.user_metadata?.cliente_id) {
  window.location.href = 'index.html';
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('error-box');
  errorBox.style.display = 'none';

  if (!email || !password) { errorBox.textContent = 'Completa todos los campos.'; errorBox.style.display = ''; return; }

  document.getElementById('btn-login').disabled      = true;
  document.getElementById('btn-text').style.display  = 'none';
  document.getElementById('btn-spinner').style.display = 'inline-block';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    errorBox.textContent = 'Correo o contraseña incorrectos.';
    errorBox.style.display = '';
    document.getElementById('btn-login').disabled      = false;
    document.getElementById('btn-text').style.display  = 'inline';
    document.getElementById('btn-spinner').style.display = 'none';
    return;
  }

  // Verificar que es cliente (tiene cliente_id en metadata)
  if (!data.user?.user_metadata?.cliente_id) {
    // Si es admin, redirigir al panel
    window.location.href = '../admin/dashboard/index.html';
    return;
  }

  window.location.href = 'index.html';
});
</script>
</body>
</html>

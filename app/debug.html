<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico — Cobrika</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body { padding: 20px; background: #f9fafb; font-family: monospace; }
    .box { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #e5e7eb; }
    .ok  { color: #057a55; font-weight: 700; }
    .err { color: #c81e1e; font-weight: 700; }
    .key { color: #1a56db; }
    pre  { white-space: pre-wrap; word-break: break-all; font-size: 12px; margin-top: 8px; }
    h3   { font-size: 14px; margin-bottom: 8px; color: #374151; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; margin-right: 8px; margin-top: 8px; }
    .btn-red   { background: #fee2e2; color: #c81e1e; }
    .btn-blue  { background: #eff6ff; color: #1a56db; }
    .btn-green { background: #f0fdf4; color: #057a55; }
  </style>
</head>
<body>
  <h2 style="margin-bottom:16px;color:#111827">🔍 Diagnóstico Cobrika</h2>

  <div class="box">
    <h3>Sesión actual</h3>
    <div id="sesion-info">Cargando...</div>
  </div>

  <div class="box">
    <h3>Datos del préstamo</h3>
    <div id="prestamo-info">Cargando...</div>
  </div>

  <div class="box">
    <h3>Acciones</h3>
    <button class="btn btn-red" onclick="cerrarSesion()">Cerrar sesión</button>
    <button class="btn btn-blue" onclick="refrescarToken()">Refrescar token</button>
    <button class="btn btn-green" onclick="irApp()">Ir a la app</button>
  </div>

  <div id="log" class="box" style="display:none">
    <h3>Log</h3>
    <pre id="log-text"></pre>
  </div>

<script type="module">
import { supabase } from '../shared/supabase-client.js';

function log(msg) {
  document.getElementById('log').style.display = '';
  document.getElementById('log-text').textContent += msg + '\n';
}

// ── Sesión ────────────────────────────────────────────────
const { data: { session }, error: sessErr } = await supabase.auth.getSession();

if (sessErr || !session) {
  document.getElementById('sesion-info').innerHTML = `<span class="err">❌ Sin sesión activa</span><br><a href="login.html">Iniciar sesión</a>`;
} else {
  const meta = session.user.user_metadata;
  const clienteId = meta?.cliente_id;

  document.getElementById('sesion-info').innerHTML = `
    <span class="ok">✓ Sesión activa</span><br>
    <span class="key">Email:</span> ${session.user.email}<br>
    <span class="key">cliente_id:</span> ${clienteId || '<span class="err">NO ENCONTRADO</span>'}<br>
    <span class="key">nombre:</span> ${meta?.nombre || '—'}<br>
    <span class="key">Token expira:</span> ${new Date(session.expires_at * 1000).toLocaleString('es-DO')}<br>
    <details style="margin-top:8px">
      <summary style="cursor:pointer;color:#6b7280;font-size:12px">Ver metadata completa</summary>
      <pre>${JSON.stringify(meta, null, 2)}</pre>
    </details>`;

  // ── Préstamos ──────────────────────────────────────────
  if (clienteId) {
    log(`Buscando préstamos para cliente_id: ${clienteId}`);

    const { data: prestamos, error: errP } = await supabase
      .from('prestamos')
      .select('id, estado, monto_capital, cliente_id')
      .eq('cliente_id', clienteId);

    if (errP) {
      document.getElementById('prestamo-info').innerHTML = `<span class="err">❌ Error RLS: ${errP.message}</span>`;
      log('ERROR: ' + errP.message);
    } else if (!prestamos?.length) {
      document.getElementById('prestamo-info').innerHTML = `
        <span class="err">❌ Sin préstamos visibles para este cliente_id</span><br>
        <small style="color:#6b7280">El cliente_id del token no coincide con ningún préstamo, o las políticas RLS bloquean el acceso.</small>`;
      log('Sin préstamos encontrados');

      // Intentar ver todos los préstamos sin filtro
      const { data: todos } = await supabase.from('prestamos').select('id, cliente_id, estado').limit(5);
      log('Préstamos visibles sin filtro: ' + JSON.stringify(todos));
    } else {
      document.getElementById('prestamo-info').innerHTML = `
        <span class="ok">✓ ${prestamos.length} préstamo(s) encontrado(s)</span>
        <pre>${JSON.stringify(prestamos, null, 2)}</pre>`;
      log('Préstamos OK: ' + prestamos.length);
    }
  } else {
    document.getElementById('prestamo-info').innerHTML = `<span class="err">❌ No hay cliente_id en el token — no se puede buscar préstamos</span>`;
  }
}

window.cerrarSesion = async () => {
  await supabase.auth.signOut();
  window.location.href = 'login.html';
};

window.refrescarToken = async () => {
  const { data, error } = await supabase.auth.refreshSession();
  if (error) { alert('Error: ' + error.message); return; }
  alert('Token refrescado. cliente_id: ' + data.session?.user?.user_metadata?.cliente_id);
  window.location.reload();
};

window.irApp = () => window.location.href = 'index.html';
</script>
</body>
</html>

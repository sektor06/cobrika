<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a56db">
  <title>Mis pagos — Cobrika</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/app.css">
</head>
<body>

  <header class="app-header">
    <a href="../index.html" style="color:#fff;display:flex;align-items:center">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:18px;height:18px"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
    </a>
    <div class="app-header-logo">Mis pagos</div>
    <div style="width:40px"></div>
  </header>

  <div class="app-content">

    <!-- Resumen total -->
    <div class="balance-card" style="margin-bottom:14px">
      <div class="balance-label">Total pagado</div>
      <div class="balance-monto" id="total-pagado">RD$ 0.00</div>
      <div class="balance-grid">
        <div class="balance-item">
          <div class="balance-item-label">Pagos</div>
          <div class="balance-item-val" id="total-cant">0</div>
        </div>
        <div class="balance-item">
          <div class="balance-item-label">Este mes</div>
          <div class="balance-item-val" id="total-mes">—</div>
        </div>
        <div class="balance-item">
          <div class="balance-item-label">Mora pagada</div>
          <div class="balance-item-val" id="total-mora">—</div>
        </div>
      </div>
    </div>

    <!-- Cuotas pendientes -->
    <div class="mov-list" id="pendientes-wrap" style="display:none">
      <div class="mov-list-title">Cuotas pendientes</div>
      <div id="lista-pendientes"></div>
    </div>

    <!-- Historial de pagos -->
    <div class="mov-list">
      <div class="mov-list-title">Historial de pagos</div>
      <div id="lista-pagos"></div>
    </div>

    <!-- Vouchers enviados -->
    <div class="mov-list">
      <div class="mov-list-title">Comprobantes enviados</div>
      <div id="lista-vouchers"></div>
    </div>

  </div>

  <!-- Loading -->
  <div class="app-loading" id="loading">
    <div class="spinner spinner-dark" style="width:28px;height:28px;border-width:2.5px"></div>
  </div>

  <!-- Nav inferior -->
  <nav class="app-nav">
    <a href="../index.html" class="nav-tab">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
      <span>Inicio</span>
    </a>
    <a href="index.html" class="nav-tab active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/></svg>
      <span>Pagos</span>
    </a>
    <a href="../voucher/index.html" class="nav-tab">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
      <span>Voucher</span>
    </a>
    <a href="../solicitud/index.html" class="nav-tab">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      <span>Solicitar</span>
    </a>
  </nav>

<div id="toast-container"></div>

<script type="module">
import { supabase }   from '../../shared/supabase-client.js';
import { formatMoney, formatFecha, toast } from '../../shared/helpers.js';

const { data: { session } } = await supabase.auth.getSession();
if (!session) { window.location.href = '../login.html'; }
const clienteId = session.user.user_metadata?.cliente_id;
if (!clienteId) { window.location.href = '../login.html'; }

// Cargar datos
const [{ data: pagos }, { data: vouchers }, { data: cuotas }, { data: prestamos }] = await Promise.all([
  supabase.from('pagos').select('*').eq('cliente_id', clienteId).eq('estado','confirmado').order('fecha_pago', { ascending: false }),
  supabase.from('vouchers').select('*').eq('cliente_id', clienteId).order('created_at', { ascending: false }).limit(10),
  supabase.from('cuotas')
    .select('*, prestamos(numero,frecuencia_pago)')
    .in('estado', ['pendiente','vencida','parcial'])
    .order('fecha_vence')
    .limit(10),
  supabase.from('prestamos').select('id').eq('cliente_id', clienteId),
]);

// Filtrar cuotas del cliente
const prestamoIds = (prestamos||[]).map(p => p.id);
const cuotasCliente = (cuotas||[]).filter(c => prestamoIds.includes(c.prestamo_id));

const pags  = pagos    || [];
const vouch = vouchers || [];
const hoy   = new Date().toISOString().split('T')[0];
const mesIn = new Date(); mesIn.setDate(1);
const mesStr = mesIn.toISOString().split('T')[0];

// KPIs
const totalPag  = pags.reduce((s,p) => s + Number(p.monto), 0);
const mesPag    = pags.filter(p => p.fecha_pago >= mesStr).reduce((s,p) => s + Number(p.monto), 0);
const moraPag   = pags.reduce((s,p) => s + Number(p.monto_mora||0), 0);

document.getElementById('total-pagado').textContent = formatMoney(totalPag);
document.getElementById('total-cant').textContent   = pags.length;
document.getElementById('total-mes').textContent    = formatMoney(mesPag);
document.getElementById('total-mora').textContent   = formatMoney(moraPag);

// Cuotas pendientes
if (cuotasCliente.length > 0) {
  document.getElementById('pendientes-wrap').style.display = '';
  document.getElementById('lista-pendientes').innerHTML = cuotasCliente.slice(0,5).map(c => {
    const vence    = new Date(c.fecha_vence + 'T00:00:00');
    const hoyCmp   = new Date(); hoyCmp.setHours(0,0,0,0);
    const dias     = Math.floor((vence - hoyCmp) / 86400000);
    const saldo    = Number(c.monto_total) - Number(c.monto_pagado);
    const esVencida= dias < 0;
    const esHoy    = dias === 0;

    return `
      <div class="mov-item" style="border-left:3px solid ${esVencida ? 'var(--cobrika-danger)' : esHoy ? 'var(--cobrika-warning)' : 'var(--cobrika-primary)'}">
        <div class="mov-ico" style="background:${esVencida ? 'var(--cobrika-danger-bg)' : esHoy ? 'var(--cobrika-warning-bg)' : '#eff6ff'}">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="${esVencida ? 'var(--cobrika-danger)' : esHoy ? 'var(--cobrika-warning)' : '#1a56db'}">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/>
          </svg>
        </div>
        <div class="mov-desc">
          <div class="mov-desc-titulo">
            Cuota #${c.numero} — Préstamo #${c.prestamos?.numero||'—'}
          </div>
          <div class="mov-desc-sub">
            ${esVencida ? `Vencida hace ${Math.abs(dias)} día${Math.abs(dias)>1?'s':''}` :
              esHoy ? 'Vence HOY' : `Vence en ${dias} día${dias>1?'s':''} · ${formatFecha(c.fecha_vence)}`}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-weight:800;font-size:.95rem;color:${esVencida?'var(--cobrika-danger)':esHoy?'var(--cobrika-warning)':'var(--cobrika-primary)'}">${formatMoney(saldo)}</div>
          <a href="../voucher/index.html" style="font-size:.7rem;color:var(--cobrika-primary);font-weight:600">Pagar →</a>
        </div>
      </div>`;
  }).join('');
}

// Historial pagos
if (pags.length) {
  document.getElementById('lista-pagos').innerHTML = pags.map(p => `
    <div class="mov-item">
      <div class="mov-ico" style="background:#f0fdf4">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="#057a55"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
      </div>
      <div class="mov-desc">
        <div class="mov-desc-titulo">Pago confirmado</div>
        <div class="mov-desc-sub">${formatFecha(p.fecha_pago)} · ${p.metodo}${p.referencia ? ' · Ref: '+p.referencia : ''}</div>
      </div>
      <div class="mov-monto-app pago">${formatMoney(p.monto)}</div>
    </div>`).join('');
} else {
  document.getElementById('lista-pagos').innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:24px;text-align:center;color:var(--gray-400);font-size:.85rem">
      Sin pagos registrados aún
    </div>`;
}

// Vouchers
if (vouch.length) {
  const estadoConfig = {
    pendiente: { bg:'#fffbeb', color:'#92400e', label:'Pendiente' },
    aprobado:  { bg:'#f0fdf4', color:'#065f46', label:'Aprobado' },
    rechazado: { bg:'#fef2f2', color:'#991b1b', label:'Rechazado' },
  };
  document.getElementById('lista-vouchers').innerHTML = vouch.map(v => {
    const cfg = estadoConfig[v.estado] || estadoConfig.pendiente;
    const monto = v.ocr_monto || v.monto_declarado;
    return `
      <div class="mov-item">
        ${v.imagen_url
          ? `<img src="${v.imagen_url}" style="width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`
          : `<div class="mov-ico" style="background:var(--gray-100)"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909"/></svg></div>`
        }
        <div class="mov-desc">
          <div class="mov-desc-titulo">${monto ? formatMoney(monto) : 'Voucher enviado'}</div>
          <div class="mov-desc-sub">${v.banco||''} ${v.referencia ? '· '+v.referencia : ''}</div>
        </div>
        <div style="background:${cfg.bg};color:${cfg.color};font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:100px;white-space:nowrap">${cfg.label}</div>
      </div>`;
  }).join('');
} else {
  document.getElementById('lista-vouchers').innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:24px;text-align:center;color:var(--gray-400);font-size:.85rem">
      No has enviado comprobantes aún
    </div>`;
}

document.getElementById('loading').style.display = 'none';
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña — Cobrika</title>
  <link rel="stylesheet" href="./assets/css/main.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a8a 0%, #1a56db 50%, #0ea5e9 100%);
      padding: 20px;
    }
    .reset-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .reset-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 6px;
      text-align: center;
    }
    .reset-sub {
      font-size: .88rem;
      color: #64748b;
      text-align: center;
      margin-bottom: 28px;
    }
    .msg-box {
      display: none;
      border-radius: 10px;
      padding: 12px;
      font-size: .85rem;
      margin-bottom: 16px;
    }
    .msg-box.error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
    }
    .msg-box.success {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #16a34a;
    }
    .form-label { display:block; font-size:.85rem; font-weight:600; color:#334155; margin-bottom:6px; }
    .form-control {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
    }
    .form-control:focus { border-color:#1a56db; box-shadow:0 0 0 3px rgba(26,86,219,.12); }
    .btn-reset {
      width: 100%;
      padding: 13px;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-reset:hover { background:#1e40af; }
    .btn-reset:disabled { opacity:.6; cursor:not-allowed; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: .85rem;
      color: #1a56db;
      text-decoration: none;
      cursor: pointer;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="reset-card">
    <div class="reset-title">Nueva contraseña</div>
    <div class="reset-sub">Escribe tu nueva contraseña para Cobrika</div>

    <div id="msg-box" class="msg-box"></div>

    <form id="reset-form" novalidate>
      <div style="margin-bottom:16px">
        <label class="form-label">Nueva contraseña</label>
        <input class="form-control" type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <div style="margin-bottom:8px">
        <label class="form-label">Confirmar contraseña</label>
        <input class="form-control" type="password" id="password2" placeholder="Repite la contraseña" autocomplete="new-password">
      </div>
      <button type="submit" class="btn-reset" id="btn-reset">Guardar contraseña</button>
    </form>

    <a class="back-link" id="back-link" href="./index.html">← Volver al inicio de sesión</a>
  </div>

  <script type="module">
    import { supabase } from './shared/supabase-client.js';

    const msgBox  = document.getElementById('msg-box');
    const form    = document.getElementById('reset-form');
    const btn     = document.getElementById('btn-reset');

    function showMsg(text, type) {
      msgBox.textContent = text;
      msgBox.className = 'msg-box ' + type;
      msgBox.style.display = 'block';
    }

    // ── Detectar errores del enlace (expirado / inválido) ──
    const hashParams = new URLSearchParams(window.location.hash.slice(1));
    if (hashParams.get('error')) {
      const code = hashParams.get('error_code') || '';
      const texto = code === 'otp_expired'
        ? 'El enlace expiró o ya fue usado. Vuelve al login y solicita uno nuevo.'
        : 'El enlace no es válido. Vuelve al login y solicita uno nuevo.';
      showMsg(texto, 'error');
      form.style.display = 'none';
    }

    // ── Verificar que llegó con sesión de recuperación ──
    let sesionLista = false;

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
        sesionLista = true;
      }
    });

    // Esperar un momento a que Supabase procese el token del enlace
    setTimeout(async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) sesionLista = true;
      if (!sesionLista && !hashParams.get('error')) {
        showMsg('No se detectó un enlace de recuperación válido. Abre esta página desde el enlace que llegó a tu correo.', 'error');
        form.style.display = 'none';
      }
    }, 1500);

    // ── Guardar contraseña nueva ──
    form.addEventListener('submit', async e => {
      e.preventDefault();
      msgBox.style.display = 'none';

      const p1 = document.getElementById('password').value;
      const p2 = document.getElementById('password2').value;

      if (p1.length < 6) { showMsg('La contraseña debe tener al menos 6 caracteres.', 'error'); return; }
      if (p1 !== p2)     { showMsg('Las contraseñas no coinciden.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Guardando…';

      const { error } = await supabase.auth.updateUser({ password: p1 });

      if (error) {
        btn.disabled = false;
        btn.textContent = 'Guardar contraseña';
        const texto = error.message?.includes('should be different')
          ? 'La contraseña nueva debe ser diferente a la anterior.'
          : 'No se pudo guardar. El enlace pudo haber expirado — solicita uno nuevo desde el login.';
        showMsg(texto, 'error');
        return;
      }

      showMsg('¡Contraseña actualizada! Redirigiendo al login…', 'success');
      form.style.display = 'none';

      // Cerrar la sesión de recuperación y mandar al login
      await supabase.auth.signOut();
      setTimeout(() => { window.location.href = './index.html'; }, 2500);
    });
  </script>
</body>
</html>
